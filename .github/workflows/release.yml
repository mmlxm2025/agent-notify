name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          binary_name="agent-notify-${VERSION}-${GOOS}-${GOARCH}${ext}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/hellolib/agent-notify/internal/cli.Version=${VERSION}" -o "${binary_name}" ./cmd/agent-notify

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Compress binary with UPX
        if: matrix.goos != 'darwin' && !(matrix.goos == 'windows' && matrix.goarch == 'arm64')
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          binary_name="agent-notify-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          upx --best --lzma "${binary_name}"

      - name: Create archive
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          binary_name="agent-notify-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          archive_name="agent-notify-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          # macOS: 将预置的 terminal-notifier.app 打包进压缩包，用户下载 agent-notify 时一并获得
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            unzip -o -q thirdparty/helper/mac/terminal-notifier-2.0.0.zip -d .
            tar -czvf "${archive_name}" "${binary_name}" terminal-notifier.app
          else
            tar -czvf "${archive_name}" "${binary_name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-notify-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
